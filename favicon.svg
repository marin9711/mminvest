<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="line" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a7fd4"/>
      <stop offset="100%" stop-color="#16c47f"/>
    </linearGradient>
  </defs>
  <!-- Pure white background -->
  <rect width="32" height="32" rx="7" fill="#ffffff"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#e0e8f0" stroke-width="1"/>
  <!-- Chart bars -->
  <rect x="5"  y="21" width="4" height="6"  fill="#1a7fd4" opacity="0.25" rx="1"/>
  <rect x="10" y="17" width="4" height="10" fill="#1a7fd4" opacity="0.3"  rx="1"/>
  <rect x="15" y="13" width="4" height="14" fill="#16c47f" opacity="0.35" rx="1"/>
  <rect x="20" y="9"  width="4" height="18" fill="#16c47f" opacity="0.45" rx="1"/>
  <!-- Trend line -->
  <polyline points="7,22 12,17 17,13 24,8" stroke="url(#line)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow -->
  <polyline points="20,7 25,7 25,12" stroke="url(#line)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="25" cy="7" r="2" fill="#16c47f"/>
</svg>