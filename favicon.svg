<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a7fd4"/>
      <stop offset="100%" stop-color="#16c47f"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#e4edf8"/>
    </linearGradient>
  </defs>
  <!-- Light background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="32" height="32" rx="7" fill="none" stroke="#c8d6e8" stroke-width="0.8"/>
  <!-- Chart bars -->
  <rect x="5" y="20" width="4" height="7" fill="#1a7fd4" opacity="0.3" rx="1"/>
  <rect x="10" y="16" width="4" height="11" fill="#1a7fd4" opacity="0.3" rx="1"/>
  <rect x="15" y="12" width="4" height="15" fill="#16c47f" opacity="0.35" rx="1"/>
  <rect x="20" y="8" width="4" height="19" fill="#16c47f" opacity="0.45" rx="1"/>
  <!-- Trend line -->
  <polyline points="7,22 12,17 17,13 24,7" stroke="url(#fg)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrow tip -->
  <polyline points="20,6 25,6 25,11" stroke="url(#fg)" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dot at arrow end -->
  <circle cx="25" cy="6" r="2" fill="#16c47f"/>
</svg>