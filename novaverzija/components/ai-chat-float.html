<div class="ai-chat-float" id="ai-chat-float">
  <div class="ai-chat-header">
    <div class="ai-chat-avatar">🤖</div>
    <div>
      <div class="ai-chat-title">MM Invest Asistent</div>
      <div class="ai-chat-sub">Pitaj me o fondovima, ETF-ovima ili kalkulatoru</div>
    </div>
    <div class="ai-online-dot"></div>
  </div>
  <div class="ai-messages" id="ai-messages">
    <div class="ai-msg bot">
      <div class="ai-msg-avatar">🤖</div>
      <div class="ai-msg-bubble">Bok! Ja sam MM Invest asistent. 👋 Mogu ti pomoći razumjeti razliku između DMF-a i PEPP-a, objasniti ETF fondove, ili te voditi kroz kalkulator. Što te zanima?</div>
    </div>
  </div>
  <div class="ai-quick-btns">
    <button class="ai-quick-btn" onclick="sendQuickMsg('Što je razlika između DMF i PEPP?')">DMF vs PEPP</button>
    <button class="ai-quick-btn" onclick="sendQuickMsg('Koji ETF preporučuješ za početnike?')">ETF za početnike</button>
    <button class="ai-quick-btn" onclick="sendQuickMsg('Kako koristiti kalkulator?')">Kako koristiti?</button>
    <button class="ai-quick-btn" onclick="sendQuickMsg('Što je državni poticaj na 3. stup?')">Državni poticaj</button>
    <button class="ai-quick-btn" onclick="sendQuickMsg('Koje su naknade na IBKR vs Trading 212?')">IBKR vs T212</button>
  </div>
  <div id="ai-faq-wrap" class="ai-faq-wrap" style="display:none">
    <p class="ai-faq-label">Često postavljana pitanja (AI je privremeno nedostupan):</p>
    <!-- Gumbi se generiraju u script.js renderFaqButtons() -->
  </div>
  <div class="ai-input-row">
    <label for="ai-input" style="position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden;">Pitanje za MM Invest asistenta</label>
    <input class="ai-input" id="ai-input" type="text" placeholder="Pitaj nešto o ulaganju..."
           aria-label="Pitanje za MM Invest asistenta"
           onkeydown="if(event.key==='Enter') sendAiMsg()">
    <button class="ai-send-btn" id="ai-send-btn" onclick="sendAiMsg()">➤</button>
  </div>
  <!-- Cloudflare Turnstile — visible widget (managed mode) -->
  <!-- ZAMIJENI data-sitekey s tvojim Turnstile Site Key-em iz Cloudflare dashboarda -->
  <div id="ai-turnstile-container" style="display:flex;justify-content:center;padding:0.35rem 0.75rem 0.55rem;">
    <div class="cf-turnstile"
         id="ai-turnstile-widget"
         data-sitekey="0x4AAAAAACnRnEJwxvINVx6G"
         data-theme="dark"
         data-size="normal"
         data-callback="onTurnstileSuccess"
         data-expired-callback="onTurnstileExpired"
         data-error-callback="onTurnstileError">
    </div>
  </div>
  <div id="ai-rate-notice" style="display:none;font-size:0.72rem;color:#f56060;padding:0.3rem 0.75rem 0.5rem;text-align:center;"></div>
</div>
<button class="ai-fab" id="ai-fab" onclick="handleFabClick(event)" aria-label="Otvori MM Invest AI asistenta" aria-expanded="false">
  <span class="fab-icon-chat" aria-hidden="true">🤖</span>
  <span class="fab-icon-close" aria-hidden="true">✕</span>
  <span class="fab-icon-minimize" id="ai-fab-minimize" onclick="event.stopPropagation(); toggleFabMinimize();" aria-label="Minimiziraj">−</span>
</button>
<button class="ai-fab-hide" id="ai-fab-hide" onclick="hideFabToggle()">👁️ sakrij AI</button>
